global:
  # Replace this path with your real source video if needed.
  input_video: "E:/_root/projects/Gaussian Splats/GASP360-drone/data/input_video/DJI_20260328162848_0011_D.OSV"
  base_output_root: "E:/_root/projects/Gaussian Splats/GASP360-drone/experiments/orientation_sweep"
  python_executable: "E:/_root/projects/Gaussian Splats/GASP360-drone/.venv/Scripts/python.exe"

  pipeline_args:
    - "--preset"
    - "indoor_real_estate"
    - "--preprocess-mode"
    - "report-only"
    - "--extract-use-preprocess-recommendation"
    - "--target-frames"
    - "100"
    - "--overwrite"
    - "--clean-preprocess"
    - "--clean-extract"
    - "--clean-normalize"
    - "--clean-convert"
    - "--clean-prepare"
    - "--reset-colmap"
    - "--force-cli"
    - "--validation-mode"
    - "--input-format"
    - "dual-fisheye"

  inspect_args:
    - "--summary-json"
    - "--promote-best"

experiments:
  - id: "ori_01_base"
    description: "pair 0 1 baseline"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "0"
      - "1"
      - "--normalize-layout"
      - "side_by_side_lr"

  - id: "ori_02_rotb180"
    description: "pair 0 1 rotate stream B by 180"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "0"
      - "1"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-rotate-b"
      - "180"

  - id: "ori_03_fliphb"
    description: "pair 0 1 flip stream B horizontally"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "0"
      - "1"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-flip-h-b"

  - id: "ori_04_rotb180_fliphb"
    description: "pair 0 1 rotate stream B by 180 and flip horizontally"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "0"
      - "1"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-rotate-b"
      - "180"
      - "--normalize-flip-h-b"

  - id: "ori_05_swap_base"
    description: "pair 1 0 baseline"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "1"
      - "0"
      - "--normalize-layout"
      - "side_by_side_lr"

  - id: "ori_06_swap_rotb180"
    description: "pair 1 0 rotate stream B by 180"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "1"
      - "0"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-rotate-b"
      - "180"

  - id: "ori_07_swap_fliphb"
    description: "pair 1 0 flip stream B horizontally"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "1"
      - "0"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-flip-h-b"

  - id: "ori_08_swap_rotb180_fliphb"
    description: "pair 1 0 rotate stream B by 180 and flip horizontally"
    pipeline_args:
      - "--normalize-multistream-mode"
      - "explicit"
      - "--normalize-stream-pair"
      - "1"
      - "0"
      - "--normalize-layout"
      - "side_by_side_lr"
      - "--normalize-rotate-b"
      - "180"
      - "--normalize-flip-h-b"